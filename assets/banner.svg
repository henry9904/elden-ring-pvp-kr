<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <linearGradient id="line-dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#30363d" stop-opacity="0"/>
      <stop offset="20%" stop-color="#58a6ff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#c9d1d9" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#58a6ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#30363d" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line-light" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d0d7de" stop-opacity="0"/>
      <stop offset="20%" stop-color="#0969da" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#57606a" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#0969da" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d0d7de" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <style>
    .bg        { fill: #f6f8fa; }
    .bg-badge  { fill: #eaeef2; }
    .bd-badge  { stroke: #d0d7de; }
    .title     { fill: #1c2128; }
    .sub-kr    { fill: #57606a; }
    .sub-en    { fill: #8c959f; }
    .acc-l     { fill: #0969da; }
    .acc-r     { fill: #8c959f; }
    .b-text    { fill: #57606a; }
    .grid-line { stroke: #1c2128; }
    .accent-v  { fill: #0969da; }
    .dot-y     { fill: #d4a72c; }
    .dot-g     { fill: #2da44e; }
    .dot-b     { fill: #0969da; }
    .dot-r     { fill: #cf222e; }
    .bd-y      { fill: #d4a72c; }
    .bd-g      { fill: #2da44e; }
    .bd-bb     { fill: #0969da; }
    .bd-r      { fill: #cf222e; }
    .top-line  { fill: url(#line-light); }
    .bot-line  { fill: url(#line-light); }

    @media (prefers-color-scheme: dark) {
      .bg        { fill: #0d1117; }
      .bg-badge  { fill: #21262d; }
      .bd-badge  { stroke: #30363d; }
      .title     { fill: #e6edf3; }
      .sub-kr    { fill: #8b949e; }
      .sub-en    { fill: #6e7681; }
      .acc-l     { fill: #58a6ff; }
      .acc-r     { fill: #6e7681; }
      .b-text    { fill: #c9d1d9; }
      .grid-line { stroke: #c9d1d9; }
      .accent-v  { fill: #58a6ff; }
      .dot-y     { fill: #e3b341; }
      .dot-g     { fill: #3fb950; }
      .dot-b     { fill: #58a6ff; }
      .dot-r     { fill: #da3633; }
      .bd-y      { fill: #e3b341; }
      .bd-g      { fill: #3fb950; }
      .bd-bb     { fill: #58a6ff; }
      .bd-r      { fill: #da3633; }
      .top-line  { fill: url(#line-dark); }
      .bot-line  { fill: url(#line-dark); }
    }
  </style>

  <!-- Background -->
  <rect class="bg" width="1200" height="280" rx="12"/>

  <!-- Subtle grid -->
  <g opacity="0.04">
    <line class="grid-line" x1="0" y1="56" x2="1200" y2="56" stroke-width="0.5"/>
    <line class="grid-line" x1="0" y1="112" x2="1200" y2="112" stroke-width="0.5"/>
    <line class="grid-line" x1="0" y1="168" x2="1200" y2="168" stroke-width="0.5"/>
    <line class="grid-line" x1="0" y1="224" x2="1200" y2="224" stroke-width="0.5"/>
    <line class="grid-line" x1="200" y1="0" x2="200" y2="280" stroke-width="0.5"/>
    <line class="grid-line" x1="400" y1="0" x2="400" y2="280" stroke-width="0.5"/>
    <line class="grid-line" x1="600" y1="0" x2="600" y2="280" stroke-width="0.5"/>
    <line class="grid-line" x1="800" y1="0" x2="800" y2="280" stroke-width="0.5"/>
    <line class="grid-line" x1="1000" y1="0" x2="1000" y2="280" stroke-width="0.5"/>
  </g>

  <!-- Left accent bars -->
  <rect class="accent-v" x="60" y="100" width="3" height="80" opacity="0.7" rx="2"/>
  <rect class="acc-r" x="68" y="116" width="3" height="48" opacity="0.5" rx="2"/>

  <!-- Right accent bars -->
  <rect class="accent-v" x="1129" y="100" width="3" height="80" opacity="0.7" rx="2"/>
  <rect class="acc-r" x="1137" y="116" width="3" height="48" opacity="0.5" rx="2"/>

  <!-- Top line -->
  <rect class="top-line" x="0" y="0" width="1200" height="1.5" rx="1"/>

  <!-- Main title -->
  <text
    class="title"
    x="600" y="128"
    font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="52"
    font-weight="700"
    letter-spacing="-1"
    text-anchor="middle"
  >Elden Ring PvP KR</text>

  <!-- Divider -->
  <rect x="420" y="147" width="360" height="1" opacity="0.25" rx="1" fill="#888"/>

  <!-- Subtitle KR -->
  <text
    class="sub-kr"
    x="600" y="174"
    font-family="'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif"
    font-size="15"
    font-weight="400"
    text-anchor="middle"
    letter-spacing="0.5"
  >엘든링 PvP 룰셋 한국어 번역 및 가이드 프로젝트</text>

  <!-- Subtitle EN -->
  <text
    class="sub-en"
    x="600" y="196"
    font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="13"
    font-weight="400"
    text-anchor="middle"
    letter-spacing="0.3"
  >Korean translations &amp; redesigns of Elden Ring PvP rulesets, duel restrictions, and community guides</text>

  <!-- Badge 1: Ruleset -->
  <g transform="translate(318,222)">
    <rect class="bg-badge bd-badge" width="118" height="26" rx="13" stroke-width="0.5"/>
    <circle class="dot-y" cx="18" cy="13" r="4"/>
    <text class="b-text" x="30" y="17.5" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Ruleset</text>
    <text class="bd-y" x="73" y="17.5" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Standard DEN</text>
  </g>

  <!-- Badge 2: Guides -->
  <g transform="translate(452,222)">
    <rect class="bg-badge bd-badge" width="96" height="26" rx="13" stroke-width="0.5"/>
    <circle class="dot-g" cx="18" cy="13" r="4"/>
    <text class="b-text" x="30" y="17.5" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Guides</text>
    <text class="bd-g" x="68" y="17.5" font-family="'Segoe UI',Arial,sans-serif" font-size="11">KR · EN</text>
  </g>

  <!-- Badge 3: Patch -->
  <g transform="translate(564,222)">
    <rect class="bg-badge bd-badge" width="82" height="26" rx="13" stroke-width="0.5"/>
    <circle class="dot-b" cx="18" cy="13" r="4"/>
    <text class="b-text" x="30" y="17.5" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Patch</text>
    <text class="bd-bb" x="60" y="17.5" font-family="'Segoe UI',Arial,sans-serif" font-size="11">1.07+</text>
  </g>

  <!-- Badge 4: Community -->
  <g transform="translate(662,222)">
    <rect class="bg-badge bd-badge" width="120" height="26" rx="13" stroke-width="0.5"/>
    <circle class="dot-r" cx="18" cy="13" r="4"/>
    <text class="b-text" x="30" y="17.5" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Community</text>
    <text class="bd-r" x="96" y="17.5" font-family="'Segoe UI',Arial,sans-serif" font-size="11">Fan</text>
  </g>

  <!-- Bottom line -->
  <rect class="bot-line" x="0" y="278" width="1200" height="2" rx="1"/>
</svg>
